controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

mecanum_drive_controller:
  ros__parameters:
    front_left_wheel_name: front_left_wheel_joint
    front_right_wheel_name: front_right_wheel_joint
    rear_left_wheel_name: rear_left_wheel_joint
    rear_right_wheel_name: rear_right_wheel_joint
    wheel_radius: 0.040
    wheel_separation_x: 0.290
    wheel_separation_y: 0.260
    base_frame_id: base_footprint
    odom_frame_id: odom
    enable_odom_tf: true
    use_stamped_vel: true

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
